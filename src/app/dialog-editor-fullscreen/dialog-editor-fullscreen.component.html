<div class="editor-shell">

  <!-- Header / toolbar -->
  <div class="editor-header">
    <div class="editor-header-left">
      <div class="editor-avatar">
        <mat-icon class="editor-logo-icon">edit_note</mat-icon>
      </div>
      <div class="editor-header-text">
        <span class="editor-title">Text Editor</span>
        <span class="editor-subtitle">Markdown supported</span>
      </div>
    </div>

    <div class="toolbar-group">
      <button mat-icon-button class="tool-btn" title="Bold" (click)="parseBold(data)">
        <mat-icon>format_bold</mat-icon>
      </button>
      <button mat-icon-button class="tool-btn" title="Italic" (click)="parseItalic(data)">
        <mat-icon>format_italic</mat-icon>
      </button>
      <button mat-icon-button class="tool-btn" title="Heading" (click)="parseHeading(data)">
        <mat-icon>title</mat-icon>
      </button>
      <button mat-icon-button class="tool-btn" title="Strikethrough" (click)="parseStrikethrough(data)">
        <mat-icon>strikethrough_s</mat-icon>
      </button>
      <div class="toolbar-divider"></div>
      <button mat-icon-button class="tool-btn" title="Link" (click)="parseLink(data)">
        <mat-icon>link</mat-icon>
      </button>
      <button mat-icon-button class="tool-btn" title="List" (click)="parseList(data)">
        <mat-icon>list</mat-icon>
      </button>
      <button mat-icon-button class="tool-btn" title="Code" (click)="parseCode(data)">
        <mat-icon>code</mat-icon>
      </button>
      <button mat-icon-button class="tool-btn" title="Quote" (click)="parseQuote(data)">
        <mat-icon>format_quote</mat-icon>
      </button>
      <button mat-icon-button class="tool-btn" title="Table" (click)="parseTable(data)">
        <mat-icon>table_chart</mat-icon>
      </button>
      <div class="toolbar-divider"></div>
      <button mat-icon-button class="tool-btn preview-btn" [class.preview-active]="!showprev" title="Toggle preview" (click)="showprev=!showprev">
        <mat-icon>{{showprev ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
    </div>

    <div class="editor-header-right">
      <button mat-icon-button class="tool-btn close-btn" title="Save and close" (click)="cancel()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <!-- Editor body -->
  <div class="editor-body">

    <!-- Split view: editor + preview -->
    <div [hidden]="showprev" class="split-view">
      <div class="pane editor-pane">
        <div class="pane-label">EDITOR</div>
        <textarea
          #textareaEl
          [(ngModel)]="data"
          (ngModelChange)="onChange($event)"
          class="code-textarea"
          (select)="select($event)"
          (click)="onclick($event)"
          (scroll)="onEditorScroll($event)"
          cdkFocusInitial
          placeholder="Start writing…"
        ></textarea>
      </div>
      <div class="pane-separator"></div>
      <div class="pane preview-pane">
        <div class="pane-label">PREVIEW</div>
        <div #previewContentEl class="preview-content" (scroll)="onPreviewScroll($event)" [innerHtml]="saniteizeme(previewfield.value)"></div>
      </div>
    </div>

    <!-- Full-width editor only -->
    <div [hidden]="!showprev" class="full-view">
      <textarea
        [(ngModel)]="data"
        (ngModelChange)="onChange(data)"
        class="code-textarea"
        (select)="select($event)"
        (click)="onclick($event)"
        placeholder="Start writing…"
      ></textarea>
    </div>

  </div>

</div>
