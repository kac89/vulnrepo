<div class="cl-shell">

  <!-- Header -->
  <div class="cl-header">
    <div class="cl-header-left">
      <div class="cl-avatar">
        <mat-icon class="cl-avatar-icon">history</mat-icon>
      </div>
      <div class="cl-header-text">
        <span class="cl-title">
          @if (!data) { Add changelog entry }
          @if (data) { Edit changelog entry }
        </span>
        <span class="cl-subtitle">Timeline event details</span>
      </div>
    </div>
    <button mat-icon-button mat-dialog-close class="cl-close-btn" title="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Body -->
  <mat-dialog-content class="cl-body">

    <div class="cl-field-group">

      <div class="cl-field-label">Event date</div>
      <div class="cl-input-wrap">
        <mat-icon class="cl-field-icon">calendar_today</mat-icon>
        <input
          class="cl-input"
          placeholder="e.g. Apr 4, 2026, 12:00:00 PM"
          #edate
          value="{{ (data ? data.date : today) | date:'medium' }}"
        >
      </div>

      <div class="cl-field-label">Description</div>
      <div class="cl-input-wrap cl-textarea-wrap">
        <mat-icon class="cl-field-icon cl-icon-top">notes</mat-icon>
        <textarea
          class="cl-input cl-textarea"
          placeholder="Describe the change…"
          #edesc
          rows="3"
        >{{data?.desc}}</textarea>
      </div>

      <div class="cl-field-label">
        Version
        <span class="cl-badge-optional">optional</span>
      </div>
      <div class="cl-input-wrap">
        <mat-icon class="cl-field-icon">tag</mat-icon>
        <input
          class="cl-input"
          placeholder="e.g. 1.0, 2.1.3"
          #eversion
          value="{{data?.version}}"
        >
      </div>
      <p class="cl-hint">Mark this entry as a version release</p>

    </div>

  </mat-dialog-content>

  <!-- Actions -->
  <div mat-dialog-actions class="cl-actions">
    <button class="cl-btn-cancel" (click)="cancel()">Cancel</button>
    @if (!data) {
      <button class="cl-btn-primary" cdkFocusInitial (click)="addChangelog(edate.value, edesc.value, eversion.value)">
        <mat-icon class="cl-btn-icon">add</mat-icon>
        Add entry
      </button>
    }
    @if (data) {
      <button class="cl-btn-primary" cdkFocusInitial (click)="editChangelog(edate.value, edesc.value, eversion.value, data)">
        <mat-icon class="cl-btn-icon">save</mat-icon>
        Save changes
      </button>
    }
  </div>

</div>
