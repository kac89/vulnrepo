<div class="vault-shell">

  <!-- Header -->
  <div class="vault-header">
    <div class="vault-header-left">
      <div class="vault-avatar">
        <mat-icon class="vault-icon">lock</mat-icon>
      </div>
      <div class="vault-header-text">
        <span class="vault-title">API Vault</span>
        <span class="vault-subtitle">Enter your vault password to access API credentials</span>
      </div>
    </div>
    <div class="vault-header-right">
      <button mat-icon-button mat-dialog-close class="tool-btn close-btn" title="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <!-- Body -->
  <div class="vault-body">

    <div class="field-group">
      <label class="field-label">Vault password</label>
      <div class="input-wrapper" [class.input-error-state]="insertkeypass.hasError('incorrect')">
        <mat-icon class="input-prefix-icon">https</mat-icon>
        <input
          class="vault-input"
          placeholder="Enter password…"
          #keypass
          [formControl]="insertkeypass"
          (keydown)="onKeydown($event, keypass.value)"
          [type]="hide ? 'password' : 'text'"
        />
        <button mat-icon-button class="visibility-btn" (click)="hide = !hide" tabindex="-1">
          <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
      @if (insertkeypass.hasError('incorrect')) {
        <p class="error-msg">
          <mat-icon class="error-icon">error_outline</mat-icon>
          Incorrect vault password
        </p>
      }
    </div>

    <label class="session-checkbox">
      <mat-checkbox [checked]="removedialog" (change)="removedialogFunc($event)" color="accent">
        <span class="checkbox-label">Do not show again in this session</span>
      </mat-checkbox>
    </label>

  </div>

  <!-- Footer -->
  <div class="vault-footer">
    <button class="btn-cancel" mat-dialog-close (click)="cancel()">
      Cancel
    </button>
    <button class="btn-open" (click)="decrypt(keypass.value)">
      <mat-icon class="btn-icon">lock_open</mat-icon>
      Open vault
    </button>
  </div>

</div>
