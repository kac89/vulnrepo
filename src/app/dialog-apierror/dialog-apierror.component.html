<div class="error-shell">

  <!-- Header -->
  <div class="error-header">
    <div class="error-header-left">
      <div class="error-avatar">
        <mat-icon class="error-avatar-icon">sync_problem</mat-icon>
      </div>
      <div class="error-header-text">
        <span class="error-title">API Error</span>
        <span class="error-subtitle">Connection issue detected</span>
      </div>
    </div>
    <button mat-icon-button mat-dialog-close class="tool-btn close-btn" title="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Body -->
  <mat-dialog-content class="error-body">
    <div class="status-banner">
      <span class="status-badge status-error">
        <span class="status-dot"></span>Disconnected
      </span>
    </div>

    <p class="error-message">
      Cannot connect to the API server,<br>or the report version has changed on the server.
    </p>

    <p class="error-hint">
      Your unsaved changes are safe — choose an action below.
    </p>
  </mat-dialog-content>

  <!-- Actions -->
  <div class="error-actions">
    <button class="action-btn action-primary" (click)="savelocally()">
      <mat-icon>download</mat-icon>
      Save locally
    </button>
    <button class="action-btn action-secondary" (click)="tryagain()">
      <mat-icon>refresh</mat-icon>
      Try again
    </button>
  </div>

</div>
