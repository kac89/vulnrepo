<div class="css-shell">

  <!-- Header -->
  <div class="css-header">
    <div class="css-header-left">
      <div class="css-avatar-logo">
        <mat-icon class="logo-icon">style</mat-icon>
      </div>
      <div class="css-header-text">
        <span class="css-title">Custom CSS</span>
        <span class="css-subtitle">Customize the HTML report appearance</span>
      </div>
    </div>
    <div class="css-header-right">
      <button mat-icon-button mat-dialog-close class="tool-btn close-btn" title="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <!-- Body -->
  <mat-dialog-content class="css-body">

    <div class="preset-row">
      <span class="section-label">Example styles</span>
      <mat-form-field appearance="outline" color="accent" class="preset-select">
        <mat-label>Pick a preset</mat-label>
        <mat-select (selectionChange)="selectcss($event)">
          <mat-option value="none">None</mat-option>
          <mat-option value="monospace">Monospace</mat-option>
          <mat-option value="cypher">Midnight</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="editor-block">
      <div class="editor-label-row">
        <mat-icon class="editor-label-icon">code</mat-icon>
        <span class="section-label">CSS editor</span>
      </div>
      <mat-form-field appearance="outline" class="editor-field" color="accent">
        <textarea
          rows="12"
          matInput
          placeholder="/* Add your custom CSS here */"
          [formControl]="report_css"
        ></textarea>
        <mat-hint>CSS only — applied directly to the HTML report</mat-hint>
      </mat-form-field>
    </div>

  </mat-dialog-content>

  <!-- Footer actions -->
  <div class="css-footer">
    <button class="action-btn cancel-btn" (click)="cancel()">Cancel</button>
    <button class="action-btn save-btn" (click)="savechange()">
      <mat-icon class="btn-icon">save</mat-icon>Save
    </button>
  </div>

</div>
