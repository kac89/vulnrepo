<div class="pass-shell">

  <!-- Header -->
  <div class="pass-header">
    <div class="pass-header-left">
      <div class="pass-avatar">
        <mat-icon class="pass-avatar-icon">lock</mat-icon>
      </div>
      <div class="pass-header-text">
        <span class="pass-title">Decrypt report</span>
        <span class="pass-subtitle">Enter the security key to unlock this report</span>
      </div>
    </div>
  </div>

  <!-- Body -->
  <mat-dialog-content class="pass-body">

<form class="pass-form" autocomplete="off">
      <div class="pass-input-wrapper" [class.pass-input-error-state]="insertpass.hasError('incorrect')">
        <mat-icon class="pass-input-prefix">shield</mat-icon>
        <input
          class="pass-input"
          [formControl]="insertpass"
          placeholder="Report security key"
          #pass
          [type]="hide ? 'password' : 'text'"
          (keydown)="onKeydown($event, pass.value, data.report_id)"
          autocomplete="new-password"
        />
        <button type="button" class="pass-visibility-btn" (click)="hide = !hide" [title]="hide ? 'Show key' : 'Hide key'">
          <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      @if (insertpass.hasError('incorrect')) {
        <p class="pass-error-msg">
          <mat-icon class="pass-error-icon">error_outline</mat-icon>
          Security key is incorrect
        </p>
      }

      @if (msg !== '') {
        <p class="pass-hint-msg">
          <mat-icon class="pass-hint-icon">info_outline</mat-icon>
          {{ msg }}
        </p>
      }
    </form>

  </mat-dialog-content>

  <!-- Progress bar -->
  @if (msg !== '') {
    <mat-progress-bar color="accent" mode="indeterminate" class="pass-progress"></mat-progress-bar>
  }

  <!-- Actions -->
  <div class="pass-actions">
    <button class="pass-btn pass-btn-cancel" (click)="cancel()">
      <mat-icon>close</mat-icon>
      Cancel
    </button>
    <button
      class="pass-btn pass-btn-decrypt"
      (click)="decrypt(pass.value, data.report_id)"
      [disabled]="msg !== ''"
    >
      <mat-icon>lock_open</mat-icon>
      Decrypt
    </button>
  </div>

</div>
