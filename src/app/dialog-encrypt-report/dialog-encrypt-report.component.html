<div class="encrypt-shell">

  <!-- Header -->
  <div class="encrypt-header">
    <div class="encrypt-header-left">
      <div class="encrypt-avatar">
        <mat-icon class="avatar-icon">enhanced_encryption</mat-icon>
      </div>
      <div class="encrypt-header-text">
        <span class="encrypt-title">Encrypted report</span>
        <span class="encrypt-subtitle">Set a secure password for the shared report</span>
      </div>
    </div>
    <div class="encrypt-header-right">
      <button mat-icon-button mat-dialog-close class="tool-btn close-btn" title="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <!-- Body -->
  <div class="encrypt-body">

    @if (!usemyrepkey) {
      <div class="field-group">
        <label class="field-label">Security key</label>
        <div class="key-input-wrap" [class.focused]="keyFocused">
          <input
            cdkFocusInitial
            [type]="hide ? 'password' : 'text'"
            [formControl]="setkey"
            #securitykey
            maxlength="256"
            class="key-input"
            placeholder="Enter or generate a key…"
            (focus)="keyFocused = true"
            (blur)="keyFocused = false"
          >
          <div class="key-actions">
            <button mat-icon-button class="tool-btn" (click)="hide = !hide"
              [title]="hide ? 'Show key' : 'Hide key'"
              [matTooltip]="hide ? 'Show key' : 'Hide key'" matTooltipPosition="below">
              <mat-icon class="action-icon">{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <button mat-icon-button class="tool-btn" (click)="genpass()"
              title="Generate key" matTooltip="Generate key" matTooltipPosition="below">
              <mat-icon class="action-icon">casino</mat-icon>
            </button>
            <button mat-icon-button class="tool-btn" [cdkCopyToClipboard]="securitykey.value" (click)="copyText()"
              title="Copy to clipboard" matTooltip="Copy to clipboard" matTooltipPosition="below">
              <mat-icon class="action-icon">content_copy</mat-icon>
            </button>
          </div>
        </div>
        <div class="field-footer">
          @if (setkey.hasError('tooweakpass')) {
            <span class="field-error">Key is too weak — minimum 8 characters</span>
          } @else {
            <span class="field-hint">{{ securitykey.value.length }} / 256 chars</span>
          }
        </div>
      </div>
    }

    <label class="checkbox-row">
      <span class="custom-checkbox" [class.checked]="usemyrepkey" (click)="changeValue()">
        <mat-icon class="check-icon">check</mat-icon>
      </span>
      <span class="checkbox-label" (click)="changeValue()">Use my report's current key</span>
    </label>

    <div class="actions-row">
      <button class="download-btn" (click)="godownload()">
        <mat-icon class="btn-icon">enhanced_encryption</mat-icon>
        Download encrypted report
      </button>
    </div>

  </div>

</div>
