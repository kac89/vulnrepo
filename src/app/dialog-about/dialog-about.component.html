<div class="about-shell">

  <!-- Header -->
  <div class="about-header" mat-dialog-title>
    <div class="about-header-left">
      <div class="about-logo-wrap">
        <img src="assets/logo/vulnrepo_logo.png" width="28" height="28" alt="VulnRepo logo" />
      </div>
      <div class="about-header-text">
        <span class="about-title">VULNRΞPO</span>
        <span class="about-subtitle">About the project</span>
      </div>
    </div>
    <button mat-icon-button mat-dialog-close class="tool-btn close-btn" aria-label="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Body -->
  <mat-dialog-content class="about-body">

    <!-- Version badges -->
    <div class="about-badges">
      <span class="badge badge--accent">βeta</span>
      <a class="badge badge--default" target="_blank" [href]="'https://github.com/kac89/vulnrepo/commit/' + app_ver">
        <mat-icon class="badge-icon">commit</mat-icon>
        {{ app_ver_short }}
      </a>
    </div>

    <!-- Info rows -->
    <div class="about-rows">

      <a class="about-row" href="https://vulnrepo.com/" target="_blank">
        <div class="about-row-icon"><mat-icon>language</mat-icon></div>
        <div class="about-row-body">
          <span class="about-row-label">Project</span>
          <span class="about-row-value">vulnrepo.com</span>
        </div>
        <mat-icon class="about-row-arrow">chevron_right</mat-icon>
      </a>

      <a class="about-row" href="https://github.com/kac89/vulnrepo/issues" target="_blank">
        <div class="about-row-icon"><mat-icon>bug_report</mat-icon></div>
        <div class="about-row-body">
          <span class="about-row-label">Issues</span>
          <span class="about-row-value">Report a bug</span>
        </div>
        <mat-icon class="about-row-arrow">chevron_right</mat-icon>
      </a>

      <a class="about-row" href="https://github.com/kac89/vulnrepo/discussions/new/choose" target="_blank">
        <div class="about-row-icon"><mat-icon>forum</mat-icon></div>
        <div class="about-row-body">
          <span class="about-row-label">Feedback</span>
          <span class="about-row-value">Discussions</span>
        </div>
        <mat-icon class="about-row-arrow">chevron_right</mat-icon>
      </a>

      <a class="about-row" href="https://kacperrybczynski.com/" target="_blank">
        <div class="about-row-icon"><mat-icon>person</mat-icon></div>
        <div class="about-row-body">
          <span class="about-row-label">Author</span>
          <span class="about-row-value">Kacper Rybczyński</span>
        </div>
        <mat-icon class="about-row-arrow">chevron_right</mat-icon>
      </a>

      <a class="about-row" href="https://github.com/kac89/vulnrepo/blob/master/LICENSE" target="_blank">
        <div class="about-row-icon"><mat-icon>gavel</mat-icon></div>
        <div class="about-row-body">
          <span class="about-row-label">License</span>
          <span class="about-row-value">Apache-2.0</span>
        </div>
        <mat-icon class="about-row-arrow">chevron_right</mat-icon>
      </a>

    </div>

  </mat-dialog-content>

</div>
